<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Party Bills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-folder">

<header class="topBar topBarWithBack">
  <button type="button" class="backBtn" onclick="goBack()" aria-label="Back">←</button>
  <div class="topBarText">
    <h1 id="folderTitle" class="topBarTitle"></h1>
    <p id="billSummary" class="topBarSub"></p>
  </div>
</header>

<div class="syncBar">
  <p class="syncStatus" id="syncStatusText">Loading sync…</p>
  <button type="button" class="btn btnGhost btnSync" id="syncNowBtn">Sync</button>
</div>

<div class="container">
  <section class="section">
    <h2 class="sectionTitle">📤 Upload bill</h2>
    <label class="fileLabel">
      <input type="file" id="fileInput" accept="image/*,.pdf,application/pdf">
      <span class="fileLabelText">Photo or PDF</span>
    </label>
    <button type="button" class="btn btnPrimary" onclick="uploadFile()">Upload</button>
  </section>

  <section class="section">
    <h2 class="sectionTitle">📄 All bills</h2>
    <div id="fileList" class="fileList"></div>
    <p id="noFilesHint" class="emptyHint hidden">No bills yet.</p>
  </section>

  <section class="section">
    <h2 class="sectionTitle">📅 Bill calendar</h2>
    <div class="calNav">
      <button type="button" class="iconBtn" id="prevMonth" aria-label="Previous month">‹</button>
      <span id="monthLabel" class="monthLabel"></span>
      <button type="button" class="iconBtn" id="nextMonth" aria-label="Next month">›</button>
    </div>
    <div class="calWeekdays" id="calWeekdays"></div>
    <div id="calendar" class="calendar"></div>
    <div id="dateLegend" class="dateLegend"></div>
  </section>
</div>

<div id="billViewer" class="billViewer" aria-hidden="true">
  <div class="billViewerBackdrop" id="billViewerBackdrop"></div>
  <div class="billViewerPanel">
    <div class="billViewerHeader">
      <span id="billViewerTitle" class="billViewerTitle"></span>
      <button type="button" id="billViewerClose" class="billViewerClose" aria-label="Close">×</button>
    </div>
    <div id="billViewerBody" class="billViewerBody"></div>
    <div class="billViewerActions">
      <a id="billViewerDownload" class="btn btnPrimary" download>Download</a>
      <a id="billViewerNewTab" class="btn btnGhost" target="_blank" rel="noopener">New tab</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="sync.js"></script>
<script src="app.js"></script>
</body>
</html>
